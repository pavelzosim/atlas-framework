<!--
  ╔══════════════════════════════════════════════════════════════╗
  ║  SYSTEM ATLAS FRAMEWORK — BODY-END CUSTOM CODE             ║
  ║  Paste this entire block into:                              ║
  ║  Wix Dashboard → Settings → Custom Code → Body - end       ║
  ╚══════════════════════════════════════════════════════════════╝

  USAGE IN ANY WIX HTML EMBED:
  ─────────────────────────────
  // 1. Target a container element by id
  AtlasFramework.renderWindowChrome('#my-header', {
	project:   'SYSTEM_ATLAS',
	module:    'gpu_guide',
	phase:     'R&D // ACTIVE',
	version:   '2.0.4',
	build:     '2025-07-09',
	status:    'SIM_RUNNING',
	statusClass: 'status-active'   // or 'status-crit' / 'status-muted'
  });

  AtlasFramework.renderFooter('#my-footer', {
	label: 'End of Technical Report',
	author: 'Pavel Zosim',
	year:   '2025'
  });
-->
<script>
(function (global) {
  'use strict';

  /* ─── tiny DOM helper ───────────────────────────────────────── */
  function $(sel, root) {
	return (root || document).querySelector(sel);
  }

  function inject(target, html) {
	var el = typeof target === 'string' ? $(target) : target;
	if (!el) {
	  console.warn('[AtlasFramework] target not found:', target);
	  return;
	}
	el.innerHTML = html;
  }

  /* ─── timestamp helper ──────────────────────────────────────── */
  function nowUTC() {
	var d = new Date();
	var pad = function(n) { return String(n).padStart(2, '0'); };
	return d.getUTCFullYear() + '-' +
		   pad(d.getUTCMonth() + 1) + '-' +
		   pad(d.getUTCDate()) + ' // ' +
		   pad(d.getUTCHours()) + ':' +
		   pad(d.getUTCMinutes()) + ' UTC';
  }

  /* ═══════════════════════════════════════════════════════════════
	 ATLAS_SITE — single source of truth for site-wide footer data.
	 Edit here once; all posts pick it up automatically.
  ═══════════════════════════════════════════════════════════════ */
  var ATLAS_SITE = {
	author:  'Pavel Zosim',
	year:    '2025',
	tagline: '( ´◔ ω◔`) ノシ',

	/* columns: label + array of { text, url } */
	links: [
	  {
		label: 'Code & Shared Tools',
		items: [
		  { text: 'GitHub',  url: 'https://github.com/pavelzosim' },
		  { text: 'Gumroad', url: 'https://gumroad.com/pavelzosim' }
		]
	  },
	  {
		label: 'Media & Documentation',
		items: [
		  { text: 'YouTube_Breakdowns', url: 'https://youtube.com/@pavelzosim' }
		]
	  },
	  {
		label: 'Direct Communication',
		items: [
		  { text: 'LinkedIn_Profile', url: 'https://linkedin.com/in/pavelzosim' }
		]
	  }
	],

	/* support / donate block (set to null to hide) */
	support: {
	  text: '// If you find this R&D useful, support future deep-dives:',
	  links: [
		{ text: 'Patreon',        url: 'https://patreon.com/pavelzosim' },
		{ text: 'Buy Me a Coffee', url: 'https://buymeacoffee.com/pavelzosim' }
	  ]
	}
  };

  /* expose so iframes can read it too */
  global.ATLAS_SITE = ATLAS_SITE;

  /* ═══════════════════════════════════════════════════════════════
	 AtlasFramework PUBLIC API
  ═══════════════════════════════════════════════════════════════ */
  var AtlasFramework = {

	/* ── 1. WINDOW CHROME HEADER ─────────────────────────────────
	   Renders a Total-Commander / Win3.1 style window header.

	   Options:
		 project     {string}  e.g. 'SYSTEM_ATLAS'
		 module      {string}  e.g. 'gpu_guide'
		 phase       {string}  e.g. 'R&D // ACTIVE'
		 version     {string}  e.g. '2.0.4 // Final_Spec'
		 build       {string}  date string — defaults to current UTC
		 status      {string}  badge text  e.g. 'SIM_RUNNING'
		 statusClass {string}  'status-active' | 'status-crit' | 'status-muted'
	── ─── ─── ─── ─── ─── ─── ─── ─── ─── ─── ─── ─── ─── ─── */
	renderWindowChrome: function (target, opts) {
	  opts = opts || {};
	  var project     = opts.project     || 'SYSTEM_ATLAS';
	  var module      = opts.module      || '—';
	  var phase       = opts.phase       || 'R&D';
	  var version     = opts.version     || '—';
	  var build       = opts.build       || nowUTC();
	  var status      = opts.status      || 'NOMINAL';
	  var statusCls   = opts.statusClass || 'status-active';

	  var html =
		'<div class="atlas-window-chrome">' +
		  '<div class="atlas-title-bar">' +
			'<div class="atlas-title-bar__left">' +
			  '<span class="atlas-chrome-btn">▲</span>' +
			  '<span>' + project + '</span>' +
			'</div>' +
			'<div class="atlas-title-bar__right">' +
			  '<span class="atlas-badge atlas-badge--' +
				(statusCls === 'status-crit' ? 'crit' :
				 statusCls === 'status-muted' ? 'muted' : 'active') +
			  '">' + status + '</span>' +
			  '<span class="atlas-chrome-btn">—</span>' +
			  '<span class="atlas-chrome-btn">□</span>' +
			  '<span class="atlas-chrome-btn">✕</span>' +
			'</div>' +
		  '</div>' +

		  '<div class="atlas-info-grid">' +
			'<div class="atlas-info-cell">' +
			  '<div><span class="atlas-info-cell__key">PROJECT  </span>' +
				'<span class="atlas-info-cell__value">' + project + '</span></div>' +
			  '<div><span class="atlas-info-cell__key">MODULE   </span>' +
				'<span class="atlas-info-cell__value">' + module + '</span></div>' +
			'</div>' +
			'<div class="atlas-info-cell">' +
			  '<div><span class="atlas-info-cell__key">PHASE    </span>' +
				'<span class="atlas-info-cell__value ' + statusCls + '">' + phase + '</span></div>' +
			  '<div><span class="atlas-info-cell__key">BUILD    </span>' +
				'<span class="atlas-info-cell__value">' + build + '</span></div>' +
			'</div>' +
		  '</div>' +
		'</div>';

	  inject(target, html);
	},

	/* ── 2. SIMPLE META-HEADER (one-liner band) ──────────────────
	   Options:
		 left   {string}  left text
		 right  {string}  right text
	── ─── ─── ─── ─── ─── ─── ─── ─── ─── ─── ─── ─── ─── ─── */
	renderMetaHeader: function (target, opts) {
	  opts = opts || {};
	  inject(target,
		'<div class="atlas-meta-header">' +
		  '<div>' + (opts.left  || '') + '</div>' +
		  '<div>' + (opts.right || '') + '</div>' +
		'</div>'
	  );
	},

	/* ── 3. META FOOTER ──────────────────────────────────────────
	   Options:
		 label  {string}  e.g. 'End of Technical Report'
		 author {string}  e.g. 'Pavel Zosim'
		 year   {string}  e.g. '2025'
	── ─── ─── ─── ─── ─── ─── ─── ─── ─── ─── ─── ─── ─── ─── */
	renderFooter: function (target, opts) {
	  opts  = opts  || {};
	  var label  = opts.label  || 'End of Report';
	  var author = opts.author || '';
	  var year   = opts.year   || new Date().getFullYear();
	  var right  = author ? author + ' // ' + year : String(year);

	  inject(target,
		'<div class="atlas-meta-footer">' +
		  '<div>' + label + '</div>' +
		  '<div>' + right + '</div>' +
		'</div>'
	  );
	},

	/* ── 3b. SITE FOOTER — reads from ATLAS_SITE automatically ───
	   Call with just a target; no options needed.
	   Data comes from the global ATLAS_SITE config above.
	   Pass opts to override individual fields if needed:
		 author  {string}
		 year    {string}
		 links   {Array}   — same shape as ATLAS_SITE.links
		 support {object}  — same shape as ATLAS_SITE.support
	── ─── ─── ─── ─── ─── ─── ─── ─── ─── ─── ─── ─── ─── ─── */
	renderSiteFooter: function (target, opts) {
	  opts = opts || {};
	  var site    = global.ATLAS_SITE || {};
	  var author  = opts.author  || site.author  || '';
	  var year    = opts.year    || site.year    || String(new Date().getFullYear());
	  var tagline = opts.tagline || site.tagline || '';
	  var cols    = opts.links   || site.links   || [];
	  var support = opts.support !== undefined ? opts.support : site.support;

	  /* title row */
	  var html =
		'<div class="atlas-footer">' +
		  '<div class="atlas-footer__title">' +
			'<span>0xF00TER // CONNECT_STAMP</span>' +
			(tagline ? '<span style="opacity:.5;">' + tagline + '</span>' : '') +
		  '</div>';

	  /* link columns */
	  if (cols.length) {
		html += '<div class="atlas-footer__grid">';
		cols.forEach(function (col) {
		  html += '<div class="atlas-footer__col">' +
			'<span class="atlas-footer__col-label">' + col.label + '</span>';
		  (col.items || []).forEach(function (item) {
			html += '<a href="' + item.url + '" target="_blank" class="atlas-nc-link">' + item.text + '</a>';
		  });
		  html += '</div>';
		});
		html += '</div>';
	  }

	  /* support block */
	  if (support) {
		html += '<div class="atlas-footer__support">' +
		  '<span class="atlas-footer__support-text">' + (support.text || '') + '</span>' +
		  '<div class="atlas-footer__support-links">';
		(support.links || []).forEach(function (l) {
		  html += '<a href="' + l.url + '" target="_blank">' + l.text + '</a>';
		});
		html += '</div></div>';
	  }

	  html += '</div>'; /* .atlas-footer */

	  inject(target, html);
	},

	/* ── 4. STATUS BAR (narrow info strip) ───────────────────────
	   Options:
		 items  {Array<{key, value, crit}>}
	── ─── ─── ─── ─── ─── ─── ─── ─── ─── ─── ─── ─── ─── ─── */
	renderStatusBar: function (target, opts) {
	  opts = opts || {};
	  var items = opts.items || [];
	  var cells = items.map(function (item) {
		return '<span style="' +
		  'font-family:var(--atlas-font-mono,monospace);' +
		  'font-size:0.68rem;text-transform:uppercase;letter-spacing:0.08em;' +
		  'margin-right:20px;' +
		  (item.crit ? 'color:var(--atlas-crit,#8b0000);' : 'opacity:0.6;') +
		  '">' +
		  '<span style="opacity:0.5;">' + item.key + ': </span>' +
		  '<strong>' + item.value + '</strong>' +
		  '</span>';
	  }).join('');

	  inject(target,
		'<div style="' +
		  'border:1px solid var(--atlas-border,rgba(0,0,0,.15));' +
		  'padding:6px 12px;' +
		  'background:rgba(0,0,0,.03);' +
		  'display:flex;flex-wrap:wrap;gap:4px;' +
		  'margin-bottom:20px;' +
		'">' + cells + '</div>'
	  );
	},

	/* ── 5. TERMINAL BLOCK ───────────────────────────────────────
	   Options:
		 target  {string|Element}  DOM target
		 lines   {Array<string>}   each string may contain:
				   **text** → <b>text</b>
				   !!text!! → <span class="red">text</span>
				   ~~text~~ → <span class="ok">text</span>
	── ─── ─── ─── ─── ─── ─── ─── ─── ─── ─── ─── ─── ─── ─── */
	renderTerminal: function (target, opts) {
	  opts  = opts  || {};
	  var lines = (opts.lines || []).map(function (l) {
		return l
		  .replace(/\*\*(.+?)\*\*/g, '<b>$1</b>')
		  .replace(/!!(.+?)!!/g,     '<span class="red">$1</span>')
		  .replace(/~~(.+?)~~/g,     '<span class="ok">$1</span>');
	  }).join('\n');

	  inject(target,
		'<div class="atlas-terminal">' + lines + '</div>'
	  );
	},

	/* ── 6. ENGINEERING PASSPORT ────────────────────────────────
	   Full document header: zones A-D + tags row.

	   Options:
		 prefix      {string}   Zone A left text, e.g. 'SYSTEM_ATLAS // R&D_LOG'
		 project     {string}   e.g. 'SUN_SURFACE_UE5'
		 module      {string}   e.g. 'compute_shaders'
		 version     {string}   e.g. '0.8.4-ALPHA'
		 logId       {string}   e.g. '#042'
		 status      {string}   DRAFT | IN_PROGRESS | EXPERIMENTAL | STABLE | COMPLETED | DEPRECATED
		 author      {string}   e.g. 'PAVEL_ZOSIM'
		 location    {string}   e.g. 'KIV_MD'
		 created     {string}   e.g. '2025.07.09'
		 modified    {string}   e.g. '2025.07.11'  (optional)
		 readTime    {string}   e.g. '~8 MIN'       (optional — auto-computed if omitted)
		 wordCount   {number}   pass to auto-calc readTime
		 tags        {Array<string>}
	── ─── ─── ─── ─── ─── ─── ─── ─── ─── ─── ─── ─── ─── ─── */
	renderEngineeringPassport: function (target, opts) {
	  opts = opts || {};

	  var prefix   = opts.prefix   || 'SYSTEM_ATLAS // R&D_LOG';
	  var project  = opts.project  || '—';
	  var module   = opts.module   || '—';
	  var version  = opts.version  || '—';
	  var logId    = opts.logId    || '—';
	  var status   = (opts.status  || 'DRAFT').toUpperCase();
	  var author   = opts.author   || '—';
	  var location = opts.location || '—';
	  var created  = opts.created  || '—';
	  var modified = opts.modified || null;
	  var tags     = Array.isArray(opts.tags) ? opts.tags : [];

	  /* read time: explicit > auto-compute from wordCount > omit */
	  var readTime = opts.readTime || null;
	  if (!readTime && opts.wordCount) {
		readTime = '~' + Math.ceil(Number(opts.wordCount) / 200) + ' MIN';
	  }

	  /* status → badge class + status CSS class */
	  var statusClassMap = {
		'DRAFT':        { badge: 'atlas-badge--muted',  cls: 'status--draft'        },
		'IN_PROGRESS':  { badge: 'atlas-badge--active', cls: 'status--in_progress'  },
		'EXPERIMENTAL': { badge: 'atlas-badge--warn',   cls: 'status--experimental' },
		'STABLE':       { badge: 'atlas-badge--ok',     cls: 'status--stable'       },
		'COMPLETED':    { badge: 'atlas-badge--ok',     cls: 'status--completed'    },
		'DEPRECATED':   { badge: 'atlas-badge--crit',   cls: 'status--deprecated'   }
	  };
	  var sc = statusClassMap[status] || statusClassMap['DRAFT'];

	  /* meta items: always show author, location, created; conditionally show modified + readTime */
	  var metaItems = [
		{ key: 'AUTH',    value: author   },
		{ key: 'LOC',     value: location },
		{ key: 'CREATED', value: created  }
	  ];
	  if (modified) { metaItems.push({ key: 'LAST_MODIFIED', value: modified }); }
	  if (readTime) { metaItems.push({ key: 'READ', value: readTime }); }

	  var metaHTML = metaItems.map(function (m) {
		return '<span class="atlas-passport__meta-item"><b>' + m.key + '</b>: ' + m.value + '</span>';
	  }).join('');

	  /* tags */
	  var tagsHTML = tags.length
		? '<div class="atlas-passport__tags">' +
			tags.map(function (t) {
			  return '<span class="atlas-passport__tag">' + t + '</span>';
			}).join('') +
		  '</div>'
		: '';

	  var html =
		'<div class="atlas-passport">' +

		  /* Zone A + B — title bar */
		  '<div class="atlas-title-bar">' +
			'<div class="atlas-title-bar__left">' +
			  '<span class="atlas-chrome-btn">▲</span>' +
			  '<span>' + prefix + '</span>' +
			'</div>' +
			'<div class="atlas-title-bar__right">' +
			  '<span class="atlas-badge ' + sc.badge + ' ' + sc.cls + '">' + status + '</span>' +
			  '<span class="atlas-chrome-btn">—</span>' +
			  '<span class="atlas-chrome-btn">□</span>' +
			  '<span class="atlas-chrome-btn">✕</span>' +
			'</div>' +
		  '</div>' +

		  /* Zone C — project / version grid */
		  '<div class="atlas-passport__grid">' +
			'<div class="atlas-passport__cell">' +
			  '<div><span class="atlas-passport__key">PROJECT</span>' +
				'<span class="atlas-passport__value">' + project + '</span></div>' +
			  '<div><span class="atlas-passport__key">MODULE</span>' +
				'<span class="atlas-passport__value">' + module + '</span></div>' +
			'</div>' +
			'<div class="atlas-passport__cell">' +
			  '<div><span class="atlas-passport__key">VERSION</span>' +
				'<span class="atlas-passport__value ' + sc.cls + '">' + version + '</span></div>' +
			  '<div><span class="atlas-passport__key">LOG_ID</span>' +
				'<span class="atlas-passport__value">' + logId + '</span></div>' +
			'</div>' +
		  '</div>' +

		  /* Zone D — meta line */
		  '<div class="atlas-passport__meta">' + metaHTML + '</div>' +

		  /* Tags */
		  tagsHTML +

		'</div>';

	  inject(target, html);
	},

	/* ── 7. AUTO-INJECT: find all [data-atlas-*] mounts ─────────
	   Scans the page for elements with data-atlas-component and
	   auto-renders them using their data attributes.
	   Call once after DOM ready: AtlasFramework.autoMount();
	── ─── ─── ─── ─── ─── ─── ─── ─── ─── ─── ─── ─── ─── ─── */
	autoMount: function () {
	  var mounts = document.querySelectorAll('[data-atlas-component]');
	  mounts.forEach(function (el) {
		var type = el.getAttribute('data-atlas-component');
		// collect all data-atlas-* attributes as opts
		var opts = {};
		Array.prototype.forEach.call(el.attributes, function (attr) {
		  if (attr.name.startsWith('data-atlas-') && attr.name !== 'data-atlas-component') {
			var key = attr.name.replace('data-atlas-', '').replace(/-([a-z])/g, function (_, c) {
			  return c.toUpperCase();
			});
			opts[key] = attr.value;
		  }
		});
		if (AtlasFramework['render' + type]) {
		  AtlasFramework['render' + type](el, opts);
		}
	  });
	}
  };

  /* expose globally */
  global.AtlasFramework = AtlasFramework;

  /* auto-mount on DOMContentLoaded */
  if (document.readyState === 'loading') {
	document.addEventListener('DOMContentLoaded', function () {
	  AtlasFramework.autoMount();
	});
  } else {
	AtlasFramework.autoMount();
  }

}(window));
</script>
