<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;700&display=swap">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/pavelzosim/atlas-framework@master/cdn/atlas-framework.css">
  <style>
	*, *::before, *::after { box-sizing: border-box; }
	html, body { margin: 0; padding: 0; overflow-x: hidden; font-family: 'JetBrains Mono', 'Courier New', monospace !important; }
	.atlas-container { max-width: 100%; overflow-x: hidden; font-family: 'JetBrains Mono', 'Courier New', monospace !important; }
	h1, h2, h3, h4, h5, h6, p, span, div, li, td, th { font-family: 'JetBrains Mono', 'Courier New', monospace !important; }
	pre { white-space: pre-wrap; word-break: break-word; font-family: 'JetBrains Mono', 'Courier New', monospace !important; }
	/* local overrides — block Wix h2 injection */
	.content-block h2 { font-size: 13px !important; border-bottom: none !important; border-top: none !important; padding: 0 !important; margin: 0 0 12px 0 !important; }
	.content-block p  { font-size: 12.5px !important; text-align: justify; }
  </style>
</head>
<body>
<div class="atlas-container">

  <!-- ════════════════════════════════════════
	   КОНТЕНТ ПОСТА — сюда вставляешь всё
	   что LLM возвращает по частям
  ════════════════════════════════════════ -->
  <div id="atlas-body">

	<div class="content-block">
	  <!-- ═══ BLOCK 01 ═══════════════════════════════════════════ -->
	  <h2>01 // Section Title</h2>
	  <p>Section body text...</p>
	</div>

	<div class="atlas-section-break" data-index="// 01"></div>

	<div class="content-block">
	  <!-- ═══ BLOCK 02 ═══════════════════════════════════════════ -->
	  <h2>02 // Section Title</h2>
	  <p>Section body text...</p>
	</div>

	<!-- ═══ EOF ══════════════════════════════════════════════════ -->
	<div class="atlas-eof-divider">
	  <span class="atlas-eof-divider__line"></span>
	  <span class="atlas-eof-divider__meta">// END OF SESSION // EOF</span>
	  <span class="atlas-eof-divider__line"></span>
	</div>

	<!-- ═══ TERMINAL ═══════════════════════════════════════════ -->
	<div id="post-terminal"></div>

  </div>
  <!-- конец #atlas-body -->

  <div id="post-footer"></div>

</div>
<!-- конец .atlas-container -->

<script>
var POST_CONFIG = {
  slug:      'post-slug-here',
  project:   'PROJECT_NAME',
  module:    'module_name',
  version:   '1.0.0',
  logId:     '#001',
  status:    'STABLE',
  author:    'pavelzosim',
  created:   '2025.01.01',
  modified:  null,
  wordCount: 1000,
  tags:      [],
  tagBaseUrl: 'https://www.pavelzosim.com/blog/tags/',
  terminalLines: [
	'**[ATLAS_COMPILE]** post-slug-here',
	'> Status: ~~STABLE~~'
  ],
  footerLabel:  '// END OF LOG — POST_TITLE',
  footerAuthor: 'pavelzosim',
  footerYear:   new Date().getFullYear()
};

(function () {
  function $q(sel) { return typeof sel === 'string' ? document.querySelector(sel) : sel; }
  function inj(t, h) { var el = $q(t); if (el) el.innerHTML = h; }

  function tryInit() {
	var AF = window.AtlasFramework || buildFallback();
	AF.renderTerminal('#post-terminal', { lines: POST_CONFIG.terminalLines });
	AF.renderFooter('#post-footer', {
	  label:  POST_CONFIG.footerLabel,
	  author: POST_CONFIG.footerAuthor,
	  year:   POST_CONFIG.footerYear
	});
  }

  function buildFallback() {
	return {
	  renderTerminal: function (t, o) {
		o = o || {};
		var lines = (o.lines || []).map(function (l) {
		  return l.replace(/\*\*(.+?)\*\*/g, '<b>$1</b>')
				  .replace(/!!(.+?)!!/g, '<span class="red">$1</span>')
				  .replace(/~~(.+?)~~/g, '<span class="ok">$1</span>');
		}).join('\n');
		inj(t, '<div class="atlas-terminal">' + lines + '</div>');
	  },
	  renderFooter: function (t, o) {
		o = o || {};
		var right = o.author ? o.author + ' // ' + (o.year || new Date().getFullYear())
							 : String(o.year || new Date().getFullYear());
		inj(t, '<div class="atlas-post-footer"><span>' + (o.label || '// END OF LOG') +
			   '</span><span>' + right + '</span></div>');
	  }
	};
  }

  if (document.readyState === 'loading') {
	document.addEventListener('DOMContentLoaded', tryInit);
  } else {
	tryInit();
  }
}());
</script>
</body>
</html>
