<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;700&display=swap">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/pavelzosim/atlas-framework@v1.8.9/cdn/atlas-framework.css">

  
</head>
<body>

<div class="atlas-container">
  <div id="site-passport"></div>
  <div id="atlas-footer"></div>
</div>

<script>
/* ═══════════════════════════════════════════════════════════════
   ФУТЕР: Нативный рендер (без CSS-патчей)
   ─────────────────────────────────────────────────────────────── */
(function() {
  var FOOTER_CONFIG_URL = 'https://cdn.jsdelivr.net/gh/pavelzosim/atlas-framework/cdn/atlas-site-footer-config.json?t=' + Date.now();
  
  fetch(FOOTER_CONFIG_URL)
    .then(r => r.json())
    .then(c => {
      var footer = document.getElementById('atlas-footer');
      // Создаем структуру, соответствующую atlas-framework.css
      footer.innerHTML = `
        <div class="atlas-footer-wrapper">
          <div class="atlas-footer-block__support-header">
            <span class="atlas-footer-block__kaomoji">${c.tagline}</span>
            <span>LET'S STAY IN TOUCH</span>
          </div>
          
          <div class="atlas-footer-block__support-content">
            <div class="atlas-footer-block__support-text">${c.support.text}</div>
            <div class="atlas-footer-block__support-links">
              ${c.support.links.map((l, idx, arr) => `
                <a href="${l.url}" class="atlas-blueprint-link">${l.text}</a>
                ${idx < arr.length - 1 ? '<span class="atlas-footer-block__support-divider">|</span>' : ''}
              `).join('')}
            </div>
          </div>

          <div class="atlas-footer-block__matrix-zone">
            ${c.links.map(g => `
              <div class="atlas-footer-block__matrix-column">
                <span class="atlas-footer-block__column-label">${g.label}</span>
                <div class="atlas-footer-block__column-items">
                  ${g.items.map(i => `<a href="${i.url}" class="atlas-blueprint-link">/ ${i.text}</a>`).join('')}
                </div>
              </div>
            `).join('')}
          </div>
        </div>
      `;
    })
    .catch(e => console.error('[ATLAS] Footer component failed to render:', e));
})();
</script>

</body>
</html>
