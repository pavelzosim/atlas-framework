<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;700&display=swap">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/pavelzosim/atlas-framework@master/cdn/atlas-framework.css">
</head>
<body>
 
<div class="atlas-container">
  <div id="site-passport"></div>
</div>

<script>
/* ═══════════════════════════════════════════════════════════════
   CONFIG — Локальный стейт данных (динамически пишется бэкендом)
   ─────────────────────────────────────────────────────────────── */
var CONFIG = {
  // Промпт-команда верхнего барельефа
  user:       'pavelzosim',
  path:       '~',
  command:    'cat unity_shaderlab_cheatsheet.log',
  
  // Базовые параметры сетки
  project:    '—',
  module:     '—',
  version:    '—',
  logId:      '—',
  status:     'DRAFT',

  // Слаг текущего поста для автоматического fetch запроса
  slug:       'unity-shaderlab-cheatsheet',

  // Поля, наполняемые асинхронно через getPostData
  author:     '...',
  created:    '----.--.--',
  modified:   null,
  wordCount:  null,
  title:      null,
  tags:       [],
  
  tagBaseUrl: 'https://www.pavelzosim.com/blog/tags/'
};

var BACKEND_URL = 'https://www.pavelzosim.com/_functions/getPostData';

function applyData(d) {
  if (d.author)    CONFIG.author   = d.author;
  if (d.title)     CONFIG.title    = d.title;
  if (d.created)   CONFIG.created  = d.created;
  if (d.modified)  CONFIG.modified = d.modified;
  if (d.project)   CONFIG.project  = d.project;
  if (d.module)    CONFIG.module   = d.module;
  if (d.version)   CONFIG.version  = d.version;
  if (d.logId)     CONFIG.logId    = d.logId;
  if (d.status)    CONFIG.status   = d.status;
  if (d.wordCount) CONFIG.wordCount = d.wordCount;
  if (Array.isArray(d.tags)) CONFIG.tags = d.tags;
  
  window.render && window.render();
}

// Асинхронный пайплайн запроса к Wix Backend
(function () {
  var slug = CONFIG.slug || '';
  if (!slug) return;
  fetch(BACKEND_URL + '?slug=' + encodeURIComponent(slug))
    .then(function (r) { return r.ok ? r.json() : null; })
    .then(function (data) { 
      if (data && !data.error) applyData(data); 
    })
    .catch(function (err) { console.warn('[ATLAS] Fetch failed', err); });
})();

// Дополнительный обработчик для Velo API (если данные посылаются через postMessage)
window.addEventListener('message', function (e) {
  var d = e.data;
  if (!d || d.source !== 'atlas-backend') return;
  applyData(d);
});

/* ═══════════════════════════════════════════════════════════════
   RENDERER — Генерация чистого HTML-дерева без хардкод-текста
   ═══════════════════════════════════════════════════════════════ */
(function () {
  function render() {
    var o = CONFIG;
    var status = (o.status || 'DRAFT').toUpperCase();
    var rt = o.readTime || (o.wordCount ? '~' + Math.ceil(Number(o.wordCount) / 200) + ' MIN' : null);

    // Сборка мета-строки (Текст подставит CSS через data-meta атрибуты)
    var metaHTML = '';
    metaHTML += '<div class="passport-meta-item" data-meta="auth">' + (o.author || '—') + '</div>';
    metaHTML += '<div class="passport-meta-item" data-meta="created">' + (o.created || '—') + '</div>';
    if (o.modified) {
      metaHTML += '<div class="passport-meta-item" data-meta="modified">' + o.modified + '</div>';
    }
    if (rt) {
      metaHTML += '<div class="passport-meta-item" data-meta="read">' + rt + '</div>';
    }

    // Сборка тегов
    var tagsHTML = '';
    if (Array.isArray(o.tags) && o.tags.length) {
      tagsHTML = '<div class="passport-tags">' +
        o.tags.map(function (tg) {
          var tagSlug = tg.toLowerCase().replace(/\s+/g, '-');
          return '<a href="' + o.tagBaseUrl + tagSlug + '" class="passport-tag" target="_top">#' + tg.toUpperCase() + '</a>';
        }).join('') +
      '</div>';
    }

    // Рендеринг чистых контейнеров (Текстовые маркеры заменены на data-key для CSS)
    document.getElementById('site-passport').innerHTML =
      '<div class="passport-bp">' +
        '<div class="passport-title-bar">' +
          '<div>' + o.user + ' : ' + o.path + ' # ' + o.command + '</div>' +
          '<div>[ SYS_STATUS: <b>' + status + '</b> ]</div>' +
        '</div>' +
        (o.title ? '<div class="passport-main-title">' + o.title.toUpperCase() + '</div>' : '') +
        '<div class="passport-grid">' +
          '<div class="passport-cell">' +
            '<div class="passport-cell-line" data-key="project">' + o.project + '</div>' +
            '<div class="passport-cell-line" data-key="module">' + o.module + '</div>' +
          '</div>' +
          '<div class="passport-cell">' +
            '<div class="passport-cell-line" data-key="version">' + o.version + '</div>' +
            '<div class="passport-cell-line" data-key="log_id">' + o.logId + '</div>' +
          '</div>' +
        '</div>' +
        '<div class="passport-meta">' + metaHTML + '</div>' +
        tagsHTML +
      '</div>';
  }

  window.render = render;
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', render);
  } else {
    render();
  }
}());
</script>
</body>
</html>
