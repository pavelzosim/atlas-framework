<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;700&display=swap">
  
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/pavelzosim/atlas-framework@v1.8.6/cdn/atlas-framework.css?v=1.8.6">

  <style>
    /* Локальный патч для паспорта */
    .atlas-container .passport-cell-line::before {
      font-weight: 700; margin-right: 12px; text-transform: uppercase;
      color: var(--atlas-ink-muted); min-width: 70px;
    }
    .atlas-container .passport-cell-line[data-key="project"]::before { content: "PROJECT"; }
    .atlas-container .passport-cell-line[data-key="module"]::before  { content: "MODULE"; }
    .atlas-container .passport-cell-line[data-key="version"]::before { content: "VERSION"; }
    .atlas-container .passport-cell-line[data-key="log_id"]::before  { content: "LOG_ID"; }
    
    .atlas-container .passport-meta-item { display: inline-block; }
    .atlas-container .passport-meta-item::before { font-weight: 700; color: var(--atlas-ink); }
    .atlas-container .passport-meta-item[data-meta="auth"]::before     { content: "AUTH: "; }
    .atlas-container .passport-meta-item[data-meta="created"]::before  { content: "CREATED: "; }
    .atlas-container .passport-meta-item[data-meta="modified"]::before { content: "LAST_MODIFIED: "; }
    .atlas-container .passport-meta-item[data-meta="read"]::before     { content: "READ: "; }
  </style>
</head>
<body>

<div class="atlas-container">
  <div id="site-passport"></div>
  <div id="atlas-footer"></div>
</div>

<script>
/* ═══════════════════════════════════════════════════════════════
   ПАСПОРТ: Логика
   ─────────────────────────────────────────────────────────────── */
var CONFIG = {
  user: 'pavelzosim', path: '~', command: 'cat unity_shaderlab_cheatsheet.log',
  project: '—', module: '—', version: '1.0', logId: '—', status: 'R&D',
  slug: 'procedural-modeling-tire-generator',
  author: '...', created: '----.--.--', modified: null, wordCount: null, title: null, tags: [],
  tagBaseUrl: 'https://www.pavelzosim.com/blog/tags/'
};

var BACKEND_URL = 'https://www.pavelzosim.com/_functions/getPostData';

function applyData(d) {
  if (d.author) CONFIG.author = d.author;
  if (d.title) {
    CONFIG.title = d.title;
    CONFIG.command = 'cat ' + d.title.toLowerCase().replace(/[^a-z0-9]+/g, '_').replace(/(^_|_$)/g, '') + '.log';
  }
  if (d.created) CONFIG.created = d.created;
  if (d.modified) CONFIG.modified = d.modified;
  if (d.project) CONFIG.project = d.project;
  if (d.module) CONFIG.module = d.module;
  if (d.version) CONFIG.version = d.version;
  if (d.logId) CONFIG.logId = d.logId;
  if (d.status) CONFIG.status = d.status;
  if (d.wordCount) CONFIG.wordCount = d.wordCount;
  if (Array.isArray(d.tags)) CONFIG.tags = d.tags;
  window.render && window.render();
}

(function () {
  var slug = CONFIG.slug || '';
  if (!slug) return;
  fetch(BACKEND_URL + '?slug=' + encodeURIComponent(slug))
    .then(r => r.ok ? r.json() : null)
    .then(data => { if (data && !data.error) applyData(data); })
    .catch(err => console.warn('[ATLAS] Passport fetch failed', err));
})();

(function () {
  function render() {
    var o = CONFIG;
    var status = (o.status || 'DRAFT').toUpperCase();
    var rt = o.readTime || (o.wordCount ? '~' + Math.ceil(Number(o.wordCount) / 200) + ' MIN' : null);
    var metaHTML = '<div class="passport-meta-item" data-meta="auth">' + (o.author || '—') + '</div>' +
                   '<div class="passport-meta-item" data-meta="created">' + (o.created || '—') + '</div>';
    if (o.modified) metaHTML += '<div class="passport-meta-item" data-meta="modified">' + o.modified + '</div>';
    if (rt) metaHTML += '<div class="passport-meta-item" data-meta="read">' + rt + '</div>';

    var tagsHTML = '';
    if (Array.isArray(o.tags) && o.tags.length) {
      tagsHTML = '<div class="passport-tags">' + o.tags.map(tg => 
        '<a href="' + o.tagBaseUrl + tg.toLowerCase().replace(/\s+/g, '-') + '" class="passport-tag" target="_top">#' + tg.toUpperCase() + '</a>'
      ).join('') + '</div>';
    }

    document.getElementById('site-passport').innerHTML =
      '<div class="passport-bp">' +
        '<div class="passport-title-bar">' +
          '<div>' + o.user + ' : ' + o.path + ' # ' + o.command + '</div>' +
          '<div>[ SYS_STATUS: <b>' + status + '</b> ]</div>' +
        '</div>' +
        (o.title ? '<div class="passport-main-title">' + o.title.toUpperCase() + '</div>' : '') +
        '<div class="passport-grid">' +
          '<div class="passport-cell"><div class="passport-cell-line" data-key="project">' + o.project + '</div><div class="passport-cell-line" data-key="module">' + o.module + '</div></div>' +
          '<div class="passport-cell"><div class="passport-cell-line" data-key="version">' + o.version + '</div><div class="passport-cell-line" data-key="log_id">' + o.logId + '</div></div>' +
        '</div>' +
        '<div class="passport-meta">' + metaHTML + '</div>' + tagsHTML +
      '</div>';
  }
  window.render = render;
  render();
}());

/* ═══════════════════════════════════════════════════════════════
   ФУТЕР: Асинхронный рендер
   ─────────────────────────────────────────────────────────────── */
(function() {
  // Добавляем timestamp, чтобы jsDelivr не отдавал кэшированный JSON
  var FOOTER_CONFIG_URL = 'https://cdn.jsdelivr.net/gh/pavelzosim/atlas-framework/cdn/atlas-site-footer-config.json?t=' + Date.now();
  
  fetch(FOOTER_CONFIG_URL)
    .then(r => r.json())
    .then(c => {
      var footer = document.getElementById('atlas-footer');
      footer.innerHTML = `
        <div class="atlas-footer-wrapper">
          <div class="atlas-footer-block__support-header">
            <div class="atlas-footer-block__kaomoji">${c.tagline}</div>
            <div>LET'S STAY IN TOUCH</div>
          </div>
          <div class="atlas-footer-block__support-content">
            <div>${c.support.text}</div>
            <div style="margin-top:10px;">
              ${c.support.links.map(l => `<a href="${l.url}" class="atlas-blueprint-link" style="margin-right:15px;">[ ${l.text} ]</a>`).join(' | ')}
            </div>
          </div>
          <div class="atlas-footer-block__matrix-zone">
            ${c.links.map(g => `
              <div class="atlas-footer-block__matrix-column">
                <span class="atlas-footer-block__column-label">${g.label}</span>
                <div class="atlas-footer-block__column-items">
                  ${g.items.map(i => `<a href="${i.url}" class="atlas-blueprint-link">/ ${i.text}</a>`).join('')}
                </div>
              </div>
            `).join('')}
          </div>
        </div>
      `;
    })
    .catch(e => console.error('[ATLAS] Footer load failed:', e));
})();
</script>

</body>
</html>
