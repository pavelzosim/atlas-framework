name: Atomic Build & Purge

on:
  push:
    branches:
      - master
    paths-ignore:
      - 'cdn/atlas-framework.css'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Hard Rebuild
        run: |
          set -e
          
          # 1. Получаем текущую версию (тег или коммит)
          VERSION=$(git describe --tags --exact-match 2>/dev/null || echo "dev-${GITHUB_SHA::7}")
          
          # 2. Удаление старого файла
          rm -f cdn/atlas-framework.css
          
          # 3. Создание файла с шапкой (без BOM)
          printf '/* ATLAS FRAMEWORK | VERSION: %s | BUILD: %s */\n' "$VERSION" "$(date -u)" > cdn/atlas-framework.css
          
          # 4. Удаляем BOM, если вдруг появился
          perl -pi -e 's/^\x{FEFF}//' cdn/atlas-framework.css
          
          # 5. Атомарная сборка в строгом порядке:
          FILES=(
            cdn/atlas-core.css
            cdn/components/atlas-typography.css
            cdn/components/atlas-layout-global.css
          )
          
          for f in "${FILES[@]}"; do
            if [ -f "$f" ]; then
              cat "$f" >> cdn/atlas-framework.css
            else
              echo "/* WARNING: missing $f */" >> cdn/atlas-framework.css
            fi
          done
          
          # 6. Проверка на пустоту (если сборка упала)
          if [ ! -s cdn/atlas-framework.css ]; then
            echo "ERROR: atlas-framework.css пустой!"
            exit 1
          fi

      - name: Push Result
        run: |
          git config --global user.name "Atlas-CI-Bot"
          git config --global user.email "actions@github.com"
          git add cdn/atlas-framework.css
          
          # Коммитим, только если были изменения
          if ! git diff --staged --quiet; then
            git commit -m "build: rebuild $(git describe --tags --exact-match 2>/dev/null || echo "dev") [skip ci]"
            git push origin master
          fi

      - name: Purge jsDelivr Cache
        run: |
          # Чистим кэш, чтобы Wix увидел изменения моментально
          curl -s "https://purge.jsdelivr.net/gh/pavelzosim/atlas-framework@master/cdn/atlas-framework.css"
