name: Global CDN Build & Purge Cache

on:
  push:
    branches:
      - master
    paths:
      - 'cdn/**'

jobs:
  build-and-purge:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }} # Нужен для возможности пуша сборки назад

      - name: Compile CSS Modules into Production Monolith
        run: |
          echo "/* ==========================================================================" > cdn/atlas-framework.css
          echo "   ATLAS FRAMEWORK PRODUCTION CORE — COMPILED MONOLITH" >> cdn/atlas-framework.css
          echo "   Generated automatically via GitHub Actions Workflow" >> cdn/atlas-framework.css
          echo "   ========================================================================== */" >> cdn/atlas-framework.css
          
          # Последовательно склеиваем ядро, базу и все дочерние модули в один файл
          cat cdn/atlas-core.css >> cdn/atlas-framework.css
          cat cdn/atlas-typography.css >> cdn/atlas-framework.css
          cat cdn/components/atlas-callout.css >> cdn/atlas-framework.css
          cat cdn/components/atlas-code-theme.css >> cdn/atlas-framework.css
          cat cdn/components/atlas-comparison.css >> cdn/atlas-framework.css
          cat cdn/components/atlas-layouts.css >> cdn/atlas-framework.css
          cat cdn/components/atlas-schema.css >> cdn/atlas-framework.css
          cat cdn/components/atlas-timeline.css >> cdn/atlas-framework.css
          cat cdn/components/atlas-uml.css >> cdn/atlas-framework.css
          cat cdn/components/atlas-vfx-tools.css >> cdn/atlas-framework.css
          
          echo "Compilation complete. Monolith built successfully."

      - name: Commit Compiled Changes to Master
        run: |
          git config --global user.name "Atlas-CI-Bot"
          git config --global user.email "actions@github.com"
          git add cdn/atlas-framework.css
          
          # Коммитим только если файл реально изменился, чтобы не зациклить экшен
          if ! git diff --staged --quiet; then
            git commit -m "build: auto-compile production atlas-framework.css [skip ci]"
            git push origin master
          else
            echo "No compiled changes detected."
          fi

      - name: Purge jsDelivr Cache
        run: |
          # Сброс главного скомпилированного файла фреймворка
          curl -s https://purge.jsdelivr.net/gh/pavelzosim/atlas-framework@master/cdn/atlas-framework.css
          
          # Сброс конфигурации футера для моментального обновления структуры ссылок
          curl -s https://purge.jsdelivr.net/gh/pavelzosim/atlas-framework@master/cdn/atlas-site-footer-config.json
