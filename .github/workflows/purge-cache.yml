name: Atlas Framework CDN Cache Purge

on:
  push:
    tags:
      - 'v*'
    branches:
      - master

permissions:
  contents: write

jobs:
  purge:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Flush and Warm jsDelivr Cache
        run: |
          echo "[ATLAS_CDN] Initiating register flush for: ${{ github.ref_name }}"
          
          # Если пуш в ветку master — сбрасываем кэш через API
          if [ "${{ github.ref_name }}" = "master" ]; then
            curl -s "https://purge.jsdelivr.net/gh/pavelzosim/atlas-framework@master/cdn/atlas-framework.css" > /dev/null
            echo "[ATLAS_CDN] Purge signal dispatched to master chain."
          fi
          
          # Холостой запрос заголовков для прогрева тега/ветки
          curl -I "https://cdn.jsdelivr.net/gh/pavelzosim/atlas-framework@${{ github.ref_name }}/cdn/atlas-framework.css"
          echo "[ATLAS_CDN] Pipeline warming transaction complete."
