name: Global CDN Purge Cache

on:
  push:
    branches:
      - master
    paths:
      - 'cdn/**'

jobs:
  purge:
    runs-on: ubuntu-latest
    steps:
      - name: Purge jsDelivr Cache
        run: |
          # Сброс главного файла фреймворка (автоматически обновляет импорты core и typography)
          curl -s https://purge.jsdelivr.net/gh/pavelzosim/atlas-framework@master/cdn/atlas-framework.css
          
          # Сброс конфигурации футера для моментального обновления структуры ссылок
          curl -s https://purge.jsdelivr.net/gh/pavelzosim/atlas-framework@master/cdn/atlas-site-footer-config.json
