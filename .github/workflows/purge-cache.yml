name: Atomic Build & Purge
on:
  push:
    branches:
      - master
    paths-ignore:
      - 'cdn/atlas-framework.css'
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Hard Rebuild
        run: |
          # Авто-версия: формат v-YYYYMMDD-HHMMSS
          VERSION="v-$(date -u +%Y%m%d-%H%M%S)"
        
          rm -f cdn/atlas-framework.css
        
          LC_ALL=C printf '/* ATLAS FRAMEWORK | VERSION: %s | BUILD: %s */\n\n' "$VERSION" "$(date -u)" > cdn/atlas-framework.css
          sed -i '1s/^\xEF\xBB\xBF//' cdn/atlas-framework.css
         
          # 1. Сначала core (базовый файл)
          echo "→ Adding: cdn/01-atlas-core.css"
          sed 's/\xEF\xBB\xBF//g' "cdn/01-atlas-core.css" >> cdn/atlas-framework.css
          echo -e "\n\n" >> cdn/atlas-framework.css

          # 2. Все компоненты строго по алфавиту
          echo "→ Adding components in alphabetical order:"
          for file in $(ls cdn/components/*.css 2>/dev/null | sort); do
            if [ -f "$file" ]; then
              echo "   • $file"
              sed 's/\xEF\xBB\xBF//g' "$file" >> cdn/atlas-framework.css
              echo -e "\n\n" >> cdn/atlas-framework.css
            fi
          done
        
          if [ ! -s cdn/atlas-framework.css ]; then 
            echo "Error: atlas-framework.css is empty!"
            exit 1
          fi

      - name: Push Result
        run: |
          git config --global user.name "Atlas-CI-Bot"
          git config --global user.email "actions@github.com"
          git add cdn/atlas-framework.css
        
          if ! git diff --staged --quiet; then
            git commit -m "build: auto-update to ${VERSION:-dev} [skip ci]"
            git push origin master
          fi

      - name: Purge jsDelivr Cache
        run: |
          URL="https://purge.jsdelivr.net/gh/pavelzosim/atlas-framework@master/cdn/atlas-framework.css"
          RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" "$URL")
        
          if [ "$RESPONSE" == "200" ]; then
            echo "Cache purged successfully."
          else
            echo "::warning::Cache purge returned status: $RESPONSE. Manual purge might be needed."
          fi
