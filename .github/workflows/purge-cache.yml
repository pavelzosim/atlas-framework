name: Atomic Build & Purge

on:
  push:
    branches:
      - master
    paths:
      - 'cdn/**'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Atomic Build
        run: |
          # 1. Удаляем старый монолит, чтобы он не засорял сборку
          rm -f cdn/atlas-framework.css
          
          # 2. Создаем файл с нуля
          echo "/* ATLAS FRAMEWORK — AUTO-GENERATED MONOLITH | BUILD: $(date -u) */" > cdn/atlas-framework.css
          
          # 3. Собираем всё подряд: сначала корень, потом компоненты
          find cdn/ -maxdepth 1 -name "*.css" ! -name "atlas-framework.css" -exec cat {} + >> cdn/atlas-framework.css
          echo -e "\n" >> cdn/atlas-framework.css
          find cdn/components/ -name "*.css" -exec cat {} + >> cdn/atlas-framework.css

      - name: Push Result
        run: |
          git config --global user.name "Atlas-CI-Bot"
          git config --global user.email "actions@github.com"
          git add cdn/atlas-framework.css
          if ! git diff --staged --quiet; then
            git commit -m "build: atomic rebuild [skip ci]"
            git push origin master
          fi

      - name: Purge Cache
        run: |
          curl -s "https://purge.jsdelivr.net/gh/pavelzosim/atlas-framework@master/cdn/atlas-framework.css"
