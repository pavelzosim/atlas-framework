name: Atomic Build & Purge

on:
  push:
    branches:
      - master # Сборка происходит при каждом пуше в мастер
    paths:
      - 'cdn/**' # Только если меняются исходники

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Atomic Rebuild Monolith
        run: |
          rm -f cdn/atlas-framework.css
          echo "/* ==========================================================================" > cdn/atlas-framework.css
          echo "   ATLAS FRAMEWORK PRODUCTION CORE — ATOMIC BUILD" >> cdn/atlas-framework.css
          echo "   BUILD_TIMESTAMP: $(date -u)" >> cdn/atlas-framework.css
          echo "   ========================================================================== */" >> cdn/atlas-framework.css
          
          cat cdn/atlas-core.css >> cdn/atlas-framework.css
          cat cdn/atlas-typography.css >> cdn/atlas-framework.css
          for file in cdn/components/*.css; do
            if [ -f "$file" ]; then
              cat "$file" >> cdn/atlas-framework.css
            fi
          done

      - name: Push Atomic Result
        run: |
          git config --global user.name "Atlas-CI-Bot"
          git config --global user.email "actions@github.com"
          git add cdn/atlas-framework.css
          
          # Если есть изменения — коммитим и пушим в мастер
          if ! git diff --staged --quiet; then
            git commit -m "build: atomic rebuild [skip ci]"
            git push origin master
          fi

      - name: Purge jsDelivr Cache
        run: |
          # Сбрасываем кэш мастера
          curl -s "https://purge.jsdelivr.net/gh/pavelzosim/atlas-framework@master/cdn/atlas-framework.css"
